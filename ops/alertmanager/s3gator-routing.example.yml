global:
  resolve_timeout: 5m

route:
  receiver: default-notify
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - receiver: critical-notify
      matchers:
        - severity = "critical"
    - receiver: warning-notify
      matchers:
        - severity = "warning"

receivers:
  - name: default-notify
    webhook_configs:
      - url: http://example-webhook.default.local/alerts

  - name: warning-notify
    webhook_configs:
      - url: http://example-webhook.warning.local/alerts

  - name: critical-notify
    webhook_configs:
      - url: http://example-webhook.critical.local/alerts
